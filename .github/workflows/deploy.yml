name: Deploy Fullstack App

on:
  push:
    branches:
      - feat/frontend 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy Frontend Files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/*"
          target: "/usr/nginx/share/html/inclusionmotto/northstar.inclusionmotto.com/frontend"
          strip_components: 1

      - name: Copy Backend Files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend/*"
          target: "/home/bilbal/backend"
          strip_components: 1

      - name: Restart FastAPI Backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/bilbal/backend
            
            # Create the venv if it doesn't exist yet
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            
            # Activate and install dependencies
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Restart the service (This will fail on the very first run, which is fine!)
            sudo systemctl restart northstar-backend.service || true