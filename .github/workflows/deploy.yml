name: Deploy Fullstack App

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy Frontend to Temp Folder
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: YOUR_CUSTOM_PORT 
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }} 
          source: "frontend/*"
          target: "/home/bilbal/frontend_temp"
          strip_components: 1

      - name: Copy Backend to Home Directory
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: YOUR_CUSTOM_PORT 
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }} 
          source: "backend" # <-- Changed this to copy the whole folder
          target: "/home/bilbal" # <-- Changed this so it creates the backend folder automatically
          # <-- Removed strip_components entirely from this step

      - name: Deploy Frontend and Restart Backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: YOUR_CUSTOM_PORT 
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }} 
          script: |
            # --- 1. DEPLOY FRONTEND ---
            # Create the correct Nginx path
            sudo mkdir -p /usr/share/nginx/html/inclusionmotto/northstar.inclusionmotto.com/frontend
            
            # Copy files from the temp folder to Nginx
            sudo cp -r /home/bilbal/frontend_temp/* /usr/share/nginx/html/inclusionmotto/northstar.inclusionmotto.com/frontend/
            
            # Ensure Nginx owns the files
            sudo chown -R www-data:www-data /usr/share/nginx/html/inclusionmotto/northstar.inclusionmotto.com/frontend

            # --- 2. DEPLOY BACKEND ---
            cd /home/bilbal/backend
            
            # Create the venv if it doesn't exist yet
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            
            # Activate and install dependencies
            source venv/bin/activate
            pip install -r requirements.txt
            
            # --- 3. RESTART SERVICE ---
            sudo systemctl restart northstar-backend.service || true